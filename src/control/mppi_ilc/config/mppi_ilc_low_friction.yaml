vehicle:
  l_f: 0.5
  l_r: 0.5
  d_l: 0.5
  d_r: 0.5
  tire_radius: 0.2
  vx_max: 1.6
  vy_max: 1.2
  omega_max: 1.8
  max_steer_angle: 1.57
  max_wheel_vel: 10.0

mppi:
  num_samples: 2000
  horizon: 40
  dt: 0.033
  lambda: 100.0
  alpha: 0.975
  exploration_ratio: 0.08
  ref_velocity: 1.2
  noise_vx: 0.25
  noise_vy: 0.25
  noise_omega: 0.4

cost:
  distance_error: 40.0
  angular_error: 30.0
  velocity_error: 10.0
  terminal_state: 10.0
  collision: 50.0
  slip_risk: 20.0          # increase slip penalty
  curvature_speed: 120.0   # stronger speed reduction on curvature
  yaw_rate_tracking: 40.0  # tighter yaw rate tracking

slip:
  learning_rate: 0.01
  slip_factor_min: 0.0
  slip_factor_max: 0.4
  excitation_threshold: 0.05
  base_friction_coeff: 0.2
  curvature_lookahead: 0.5
  curvature_floor: 0.5
  speed_margin: 0.25
  enable_compensation: true
  compensation_gain: 0.9

feedback:
  k_lateral: 2.5
  k_heading: 1.0
  k_integral: 0.5

ilc:
  enabled: false
  reset_on_new_path: false
  k_lateral: 0.12
  k_heading: 0.04
  decay: 0.997
  max_bias_v: 0.6
  max_bias_omega: 0.8
  curvature_threshold: 0.08   # lower threshold: be conservative in turns
  error_deadband: 0.01        # larger deadband to ignore small noise
  max_update_lateral: 0.01    # smaller per-step update
  max_update_heading: 0.01    # smaller per-step update

xy_goal_tolerance: 0.5
yaw_goal_tolerance: 3.14

control_rate: 50.0

goal_proximity:
  threshold: 0.8
  feedback_fade: true

tracking:
  idx_window_back: 25
  idx_window_fwd: 60
  idx_allow_wraparound: true
  closed_path_threshold: 0.6
  idx_heading_weight: 0.4
  idx_heading_gate: 1.2
  global_fallback_factor: 1.6
