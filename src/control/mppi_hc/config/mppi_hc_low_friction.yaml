# MPPI-HC Configuration for Low-Friction Rectangular Path Tracking
# Optimized for friction coefficient mu = 0.3

# Vehicle parameters
vehicle:
  l_f: 0.5
  l_r: 0.5
  d_l: 0.5
  d_r: 0.5
  tire_radius: 0.2
  vx_max: 1.5               # Lower max speed for low friction
  vy_max: 1.5
  omega_max: 2.0
  max_steer_angle: 1.57
  max_wheel_vel: 10.0

# MPPI parameters
mppi:
  num_samples: 4000         # More samples for better coverage
  horizon: 60               # Longer horizon to anticipate corners
  dt: 0.033
  lambda: 80.0              # Slightly lower for more exploration
  alpha: 0.98               # More smoothing
  exploration_ratio: 0.15   # More exploration
  ref_velocity: 1.2         # Lower reference velocity
  noise_vx: 0.4             # Lower noise for smoother control
  noise_vy: 0.4
  noise_omega: 0.6

# Cost function weights - optimized for rectangular path
cost:
  distance_error: 50.0      # Higher for precise path tracking
  angular_error: 35.0
  velocity_error: 8.0
  terminal_state: 15.0
  collision: 80.0
  slip_risk: 25.0           # Higher slip penalty for low friction
  curvature_speed: 80.0     # Strong curvature speed regulation
  yaw_rate_tracking: 35.0   # Strong yaw rate tracking for corners

# Slip parameters - tuned for mu = 0.3
slip:
  learning_rate: 0.015      # Faster learning
  slip_factor_min: 0.0
  slip_factor_max: 0.5      # Allow larger slip estimates
  excitation_threshold: 0.08  # Lower threshold to catch low-speed slip
  base_friction_coeff: 0.3  # Matches simulation friction
  curvature_lookahead: 0.8  # Look ahead more for corners
  curvature_floor: 0.4      # Adjusted for omni robot
  speed_margin: 0.4         # More margin for safety
  enable_compensation: true
  compensation_gain: 0.85   # Strong compensation

control_rate: 50.0
